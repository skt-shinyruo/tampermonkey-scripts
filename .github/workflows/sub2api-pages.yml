name: Publish Userscripts

on:
  push:
    branches:
      - main
    paths:
      - 'linuxdo/**'
      - 'sub2api/**'
      - '.github/workflows/sub2api-pages.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: userscripts-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run Sub2API tests
        run: node --test sub2api/sub2api-helper.user.test.mjs

      - name: Check Sub2API build script syntax
        run: node --check sub2api/build-userscript.mjs

      - name: Build Sub2API userscript
        run: |
          script_url="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/build/sub2api-helper.user.js"
          SUB2API_UPDATE_URL="$script_url" \
          SUB2API_DOWNLOAD_URL="$script_url" \
          node sub2api/build-userscript.mjs --output=dist/sub2api-helper.user.js

      - name: Check Linux.do source syntax
        run: node --check linuxdo/linuxdo-open-links-new-tab.user.js

      - name: Check Linux.do build script syntax
        run: node --check linuxdo/build-userscript.mjs

      - name: Test Linux.do build script
        run: node --test linuxdo/linuxdo-open-links-new-tab.user.test.mjs

      - name: Build Linux.do userscript
        run: |
          script_url="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/build/linuxdo-open-links-new-tab.user.js"
          LINUXDO_UPDATE_URL="$script_url" \
          LINUXDO_DOWNLOAD_URL="$script_url" \
          node linuxdo/build-userscript.mjs --output=dist/linuxdo-open-links-new-tab.user.js

      - name: Check Sub2API userscript syntax
        run: node --check dist/sub2api-helper.user.js

      - name: Check Linux.do userscript syntax
        run: node --check dist/linuxdo-open-links-new-tab.user.js

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Publish userscripts to build branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          publish_dir="$(mktemp -d)"
          cp dist/sub2api-helper.user.js "$publish_dir/sub2api-helper.user.js"
          cp dist/linuxdo-open-links-new-tab.user.js "$publish_dir/linuxdo-open-links-new-tab.user.js"

          git fetch origin build:refs/remotes/origin/build || true
          if git show-ref --verify --quiet refs/remotes/origin/build; then
            git switch --detach origin/build
          else
            git switch --orphan build
            git rm -rf . || true
          fi

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp "$publish_dir/"*.user.js .
          cat > README.md <<'EOF'
          # Tampermonkey Script Builds

          This branch is generated by GitHub Actions from `main`.
          Do not edit files here manually.

          - `sub2api-helper.user.js`
          - `linuxdo-open-links-new-tab.user.js`
          EOF

          git add -A
          if git diff --cached --quiet; then
            echo "No build branch changes to publish."
          else
            git commit -m "chore: publish userscript builds"
            git push origin HEAD:build
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
